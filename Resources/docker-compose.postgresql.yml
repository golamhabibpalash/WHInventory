services:
  postgres:
    image: postgres:16-alpine
    container_name: myinventory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: MyInventory
      POSTGRES_USER: ghp
      POSTGRES_PASSWORD: MyInventory_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghp -d MyInventory"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
